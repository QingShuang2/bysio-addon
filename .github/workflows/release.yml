name: Build and release add-in

on:
  push:
    tags:
      - '*'

env:
  DIST: dist

jobs:
  build:
    name: Build add-in (self-hosted Windows with Excel)
    runs-on: [self-hosted, windows]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run build script
        shell: pwsh
        run: |
          Write-Host "Running build_and_test.ps1 on $(Get-ComputerInfo -Property CsName | Select -ExpandProperty CsName)"
          ./tools/build_and_test.ps1

      - name: Rename artifact with tag
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          $dist = '${{ env.DIST }}'
          $source = Get-ChildItem -Path $dist -Filter *.xlam | Select-Object -First 1
          if (-not $source) { Write-Error "No .xlam built in $dist"; exit 1 }
          $dest = Join-Path $dist ("bysio-addon-$tag.xlam")
          Copy-Item $source.FullName -Destination $dest -Force
          Write-Host "Artifact -> $dest"

      - name: Upload xlam artifact
        uses: actions/upload-artifact@v4
        with:
          name: xlam
          path: ${{ env.DIST }}/bysio-addon-${{ github.ref_name }}.xlam

  release:
    name: Create GitHub release and attach artifact
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download built xlam artifact
        uses: actions/download-artifact@v4
        with:
          name: xlam
          path: ./artifact

      - name: List files
        run: ls -la artifact

      - name: Create release and upload asset
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          files: artifact/*.xlam
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
